<style>
  :root{
    --green:#21CE99;
    --green-dark:#17A87D;
    --ink:#0B0E0C;
    --gold:#C9A227;
    --stage:#0B1015;
    --card:#10161C;
    --line:#22303A;
    --muted:#8FA3B0;
    --head:#7E93A0;
    --text:#E8EDF0;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
    background:var(--stage);color:var(--text);
    -webkit-font-smoothing:antialiased;min-height:100vh;
  }
  .mono{font-family:'IBM Plex Mono',monospace}
  a{color:inherit}

  .top{
    display:flex;align-items:center;justify-content:space-between;
    padding:18px clamp(20px,5vw,48px);border-bottom:1px solid #1A222B;
  }
  .logo{
    font-weight:800;font-size:17px;letter-spacing:-.02em;display:flex;align-items:center;gap:9px;
    color:var(--text);text-decoration:none;
  }
  .logo .leaf{
    width:16px;height:16px;background:var(--green);border-radius:50% 50% 50% 2px;
    transform:rotate(-45deg);flex-shrink:0;
  }
  .top-link{
    font-size:13px;font-weight:600;color:var(--muted);text-decoration:none;
  }
  .top-link:hover{color:var(--green)}

  main{
    max-width:480px;margin:0 auto;
    padding:48px clamp(20px,5vw,28px) 64px;
    display:flex;flex-direction:column;align-items:center;gap:22px;
  }
  .eyebrow{
    font-size:12px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;
    color:var(--head);text-align:center;
  }
  body.is-premium .eyebrow{color:var(--gold)}

  .scratch-card{
    width:100%;background:var(--card);border:1px solid var(--line);border-radius:20px;
    box-shadow:0 28px 60px -20px rgba(0,0,0,.7);padding:24px 22px 20px;
  }
  .scratch-card.premium{border-color:#3A3320;box-shadow:0 28px 60px -20px rgba(160,128,20,.25)}
  .sc-head{
    font-size:11.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
    color:var(--head);display:flex;justify-content:space-between;gap:8px;align-items:baseline;
  }
  .tier-badge.prem{color:var(--gold)}
  .scratch-frame{
    position:relative;margin-top:16px;border-radius:12px;overflow:hidden;
    background:#0B1015;min-height:190px;user-select:none;
  }
  .prize{
    position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:6px;text-align:center;padding:36px 22px;min-height:190px;
  }
  .prize::before{
    content:"";position:absolute;inset:10px;border:2px solid #21CE99;border-radius:4px;pointer-events:none;
  }
  .prize::after{
    content:"";position:absolute;inset:16px;border:1px solid rgba(33,206,153,.45);border-radius:2px;pointer-events:none;
  }
  .scratch-card.premium .prize::before{border-color:var(--gold)}
  .scratch-card.premium .prize::after{border-color:rgba(201,162,39,.45)}
  .prize .amt{
    position:relative;z-index:1;font-weight:800;font-size:clamp(26px,6vw,34px);
    letter-spacing:-.02em;color:var(--text);max-width:100%;
  }
  .prize .amt.win{color:#21CE99}
  .prize .amt.gold{color:var(--gold)}
  .prize .lbl{
    position:relative;z-index:1;font-size:12.5px;font-weight:500;color:var(--muted);max-width:260px;
  }

  .receipt{
    display:inline-flex;align-items:center;justify-content:center;gap:6px;
    margin-top:16px;width:100%;min-height:44px;padding:12px 16px;
    font-size:14px;font-weight:700;letter-spacing:.02em;
    color:var(--green);text-decoration:none;border:1px solid #1E3A32;border-radius:12px;
    background:#0E1714;
  }
  .receipt:hover{border-color:var(--green);background:#12201B}
  .receipt[hidden]{display:none!important}

  .status{
    display:none;font-size:13.5px;line-height:1.5;color:var(--muted);text-align:center;
    max-width:360px;
  }
  .status.show{display:block}

  .cta{
    display:flex;align-items:center;justify-content:center;width:100%;min-height:52px;
    padding:14px 18px;border-radius:14px;text-decoration:none;
    background:var(--green);color:#0B1015;font-weight:800;font-size:16px;letter-spacing:-.01em;
    box-shadow:0 16px 36px -18px rgba(33,206,153,.7);
  }
  .cta:hover{background:#1BB786}
  .fine{
    font-size:12.5px;color:var(--head);text-align:center;line-height:1.45;
  }
  .fine a{color:var(--muted);font-weight:600}
</style>

<body>
  <header class="top">
    <a class="logo" href="https://scratch4663.xyz/"><span class="leaf" aria-hidden="true"></span>$SCRATCH</a>

  </header>

  <main>
    <p class="eyebrow">settled on robinhood chain</p>

    <article class="scratch-card" id="winCard">
      <div class="sc-head">
        <span id="winReq" class="mono">REQUEST</span>
        <span class="tier-badge" id="winTier">STANDARD</span>
      </div>
      <div class="scratch-frame">
        <div class="prize">
          <div class="amt" id="winAmt">…</div>
          <div class="lbl" id="winLbl">Loading settlement</div>
        </div>
      </div>
      <a class="receipt" id="winReceipt" href="#" target="_blank" rel="noopener" hidden>receipt →</a>
    </article>

    <p class="status" id="winStatus"></p>

    <a class="cta" href="https://scratch4663.xyz/">scratch yours → scratch4663.xyz</a>
    <p class="fine">daily onchain scratch-offs · odds from the contract that enforces them · <a href="https://x.com/scratch4663" target="_blank" rel="noopener">@scratch4663</a></p>
  </main>
