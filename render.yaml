# Static site for scratch4663.xyz — publish directory is `site/`.
#
# Ops services (entropy operator + win-cards) are NOT listed here — adding them
# would fight this Blueprint. Create them from the dashboard per ops/DEPLOY-RENDER.md.
#
# Important: do NOT add a catch-all SPA rewrite (/* → /index.html).
# /win.html?req=N&tier=T must be served as the real win.html file so
# browsers and X/OG crawlers get the branded share page (query strings preserved).
# Existing files in the publish directory are matched before any rewrite.

services:
  - type: web
    name: scratch4663
    runtime: static
    staticPublishPath: ./site
    buildCommand: ""
    routes:
      # Explicit identity rewrite — documents that win.html is not SPA-fallbacked.
      - type: rewrite
        source: /win.html
        destination: /win.html
      - type: rewrite
        source: /og-win.png
        destination: /og-win.png
